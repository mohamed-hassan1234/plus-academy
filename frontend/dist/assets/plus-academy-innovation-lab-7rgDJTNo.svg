    <ellipse cx="520" cy="330" rx="520" ry="380" fill="url(#glowTeal)" filter="url(#softBlur)"/>
    <ellipse cx="1120" cy="520" rx="560" ry="420" fill="url(#glowBlue)" filter="url(#softBlur)"/>
