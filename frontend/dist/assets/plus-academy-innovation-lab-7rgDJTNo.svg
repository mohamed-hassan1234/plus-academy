<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Plus Academy innovation lab scene with students learning technology">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#FBFEFF"/>
      <stop offset="100%" stop-color="#F6FCFF"/>
    </linearGradient>

    <radialGradient id="glowTeal" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#11D4C0" stop-opacity="0.26"/>
      <stop offset="40%" stop-color="#11D4C0" stop-opacity="0.12"/>
      <stop offset="75%" stop-color="#11D4C0" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowBlue" cx="65%" cy="55%" r="70%">
      <stop offset="0%" stop-color="#62AAFF" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#62AAFF" stop-opacity="0.08"/>
      <stop offset="85%" stop-color="#62AAFF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.72"/>
    </linearGradient>

    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B3D73" stop-opacity="0.10"/>
      <stop offset="50%" stop-color="#11D4C0" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#62AAFF" stop-opacity="0.10"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#11D4C0" stop-opacity="0"/>
      <stop offset="45%" stop-color="#11D4C0" stop-opacity="0.75"/>
      <stop offset="60%" stop-color="#62AAFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#11D4C0" stop-opacity="0"/>
    </linearGradient>

    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" />
    </filter>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#0B3D73" flood-opacity="0.12"/>
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#11D4C0" flood-opacity="0.10"/>
    </filter>

    <filter id="tinyShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0B3D73" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Base -->
